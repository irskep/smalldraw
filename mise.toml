experimental_monorepo_root = true

[settings]
experimental = true

[tools]
bun = "1.3.10"
node = "24"
"pipx:persistproc" = "latest"
"npm:wrangler" = "latest"

[tasks."db:push"]
env = { _.file = ".env", DATABASE_URL = "./sqlite/dev.db" }
run = "bunx drizzle-kit push"

[tasks."db:generate"]
env = { _.file = ".env", DATABASE_URL = "./sqlite/dev.db" }
run = "bunx drizzle-kit generate"

[tasks."server:dev"]
dir = "apps/server"
env = { _.file = ".env", DATABASE_URL = "./sqlite/dev.db" }
run = """
export FRONTEND_ORIGINS="$(bash ../../scripts/derive-frontend-origins.sh)"
printf 'server:dev FRONTEND_ORIGINS=%s\n' "$FRONTEND_ORIGINS"
bun run dev
"""

[tasks."server:bootstrap-admin:dev"]
dir = "apps/server"
env = { _.file = ".env", DATABASE_URL = "./sqlite/dev.db", ADMIN_USERNAME = "admin", ADMIN_PASSWORD = "asdfjkl;" }
depends = ["db:push"]
run = "bun run scripts/bootstrap-admin.ts"

[tasks."server:bootstrap-admin:prod"]
dir = "apps/server"
env = { _.file = ".env", NODE_ENV = "production", DATABASE_URL = "./sqlite/prod.db" }
depends = ["db:push:prod"]
run = "bun run scripts/bootstrap-admin.ts"

[tasks."db:studio"]
env = { _.file = ".env", DATABASE_URL = "./sqlite/dev.db" }
run = "bunx drizzle-kit studio"

[tasks."account:web:dev"]
dir = "apps/app"
run = "bun run dev"

[tasks."prod:build"]
env = { _.file = ".env", NODE_ENV = "production", DATABASE_URL = "./sqlite/prod.db" }
run = "bun run ./scripts/prod-build.ts"

[tasks."prod:serve"]
dir = "apps/server"
env = { _.file = ".env", NODE_ENV = "production", DATABASE_URL = "./sqlite/prod.db", FRONTEND_ORIGINS = "http://localhost:3030" }
run = "bun src/index.ts"

[tasks."splat:web:dev"]
alias = ["splat:dev"]
dir = "apps/splat-web"
env = { _.file = ".env", SPLATTERBOARD_PUBLIC_SYNC_SERVER_HTTP_URL = "http://localhost:3030/api", SPLATTERBOARD_PUBLIC_SYNC_SERVER_WEBSOCKET_URL = "ws://localhost:3030", SPLATTERBOARD_PUBLIC_JOIN_BASE_URL = "http://localhost:3000" }
run = "bun run dev"

[tasks."db:push:prod"]
env = { _.file = ".env", DATABASE_URL = "./sqlite/prod.db" }
run = "bunx drizzle-kit push"

[tasks."ts:check:all"]
alias = ["typecheck"]
# Run all ts:check tasks across the monorepo using wildcard pattern
# also lint just so there's one easy command to run
run = [
  "mise run '//packages/...:ts:check'",
  "mise run '//apps/...:ts:check'",
  'mise run lint:all',
]

[tasks."lint:all"]
run = ["mise run '//packages/...:lint'", "mise run '//apps/...:lint'"]

[tasks."format:all"]
alias = ["format"]
run = "bun run format"

[tasks."test:all"]
# Run all test tasks across the monorepo using wildcard pattern
run = [
  "mise run '//packages/...:test' > /dev/null",
  "mise run '//apps/...:test' > /dev/null",
]

[tasks."test:all:with-output"]
# Run all test tasks across the monorepo using wildcard pattern
run = ["mise run '//packages/...:test'", "mise run '//apps/...:test'"]

[tasks."validate:all"]
run = ["mise run format", "mise run lint:all", "mise run ts:check:all", "mise run test:all"]

[tasks."docs:typedoc"]
run = """
bun x typedoc \
  --tsconfig packages/core/tsconfig.typedoc.json \
  --entryPoints packages/core/src/index.ts \
  --out docs/.vuepress/public/api
"""

[tasks."docs:dev"]
dir = "apps/docs-site"
run = "bun run dev"

[tasks."docs:build"]
depends = ["docs:typedoc"]
dir = "apps/docs-site"
run = "bun run build"

[tasks."splat:web:build"]
run = "mise run //apps/splat-web:build"

[tasks."splat:web:deploy"]
run = "mise run //apps/splat-web:deploy"

[tasks."splat:desktop:dev"]
dir = "apps/splat-desktop"
run = "bun run dev"

[tasks."splat:desktop:build"]
run = "mise run //apps/splat-desktop:build"

[tasks."splat:desktop:package"]
run = "mise run //apps/splat-desktop:package"

[tasks."server:deploy"]
run = "fly deploy -c apps/server/fly.toml"
