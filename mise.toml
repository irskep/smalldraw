experimental_monorepo_root = true

[monorepo]
config_roots = [
  "apps/app",
  "apps/docs-site",
  "apps/server",
  "apps/splat-desktop",
  "apps/splat-web",
  "packages/core",
  "packages/design-system",
  "packages/geometry",
  "packages/renderer-canvas",
  "packages/renderer-raster",
  "packages/server-cli",
  "packages/shared",
  "packages/splat",
  "packages/testing",
]

[settings]
experimental = true

[tools]
bun = "1.3.10"
tilt = "0.37.1"
"github:irskep/localci" = "0.2.0"
node = "24"
"pipx:persistproc" = "latest"
"npm:wrangler" = "latest"

[tasks."localci:setup"]
description = "Install dependencies for LocalCI runs"
run = [
  "mise install",
  "bun install --frozen-lockfile",
]

[tasks."db:push"]
env = { _.file = ".env", DATABASE_URL = "./sqlite/dev.db" }
run = "bunx drizzle-kit push"

[tasks."db:generate"]
env = { _.file = ".env", DATABASE_URL = "./sqlite/dev.db" }
run = "bunx drizzle-kit generate"

[tasks."server:dev"]
dir = "apps/server"
env = { _.file = ".env", DATABASE_URL = "./sqlite/dev.db" }
run = """
export FRONTEND_ORIGINS="$(bash ../../scripts/derive-frontend-origins.sh)"
printf 'server:dev FRONTEND_ORIGINS=%s\n' "$FRONTEND_ORIGINS"
bun run dev
"""

[tasks."server:bootstrap-admin:dev"]
dir = "apps/server"
env = { _.file = ".env", DATABASE_URL = "./sqlite/dev.db", ADMIN_USERNAME = "admin", ADMIN_PASSWORD = "asdfjkl;" }
depends = ["db:push"]
run = "bun run scripts/bootstrap-admin.ts"

[tasks."server:bootstrap-admin:prod"]
dir = "apps/server"
env = { _.file = ".env", NODE_ENV = "production", DATABASE_URL = "./sqlite/prod.db" }
depends = ["db:push:prod"]
run = "bun run scripts/bootstrap-admin.ts"

[tasks."db:studio"]
env = { _.file = ".env", DATABASE_URL = "./sqlite/dev.db" }
run = "bunx drizzle-kit studio"

[tasks."account:web:dev"]
dir = "apps/app"
env = { VITE_API_URL = "http://localhost:3030/api/v1", VITE_BASE = "/" }
run = "bun run dev"

[tasks."prod:build"]
env = { _.file = ".env", NODE_ENV = "production", DATABASE_URL = "./sqlite/prod.db", DEPLOY_HOST = "splatterboard.app" }
run = "bun run ./scripts/prod-build.ts"

[tasks."prod:serve"]
dir = "apps/server"
env = { _.file = ".env", NODE_ENV = "production", DATABASE_URL = "./sqlite/prod.db" }
run = "bun src/index.ts"

[tasks."splat:web:dev"]
alias = ["splat:dev"]
dir = "apps/splat-web"
env = { _.file = ".env", SPLATTERBOARD_PUBLIC_SYNC_SERVER_HTTP_URL = "http://localhost:3030/api/v1", SPLATTERBOARD_PUBLIC_SYNC_SERVER_WEBSOCKET_URL = "ws://localhost:3030", SPLATTERBOARD_PUBLIC_JOIN_BASE_URL = "http://localhost:3000", SPLATTERBOARD_PUBLIC_ASSET_BASE_URL = "http://localhost:3030" }
run = "bun run dev"

[tasks."design-system:dev"]
alias = ["ds:dev"]
dir = "packages/design-system"
run = "bun run dev"

[tasks."design-system:ts:check"]
alias = ["ds:ts:check"]
dir = "packages/design-system"
run = "bun run ts:check"

[tasks."design-system:test"]
dir = "packages/design-system"
run = "bun run test"

[tasks."design-system:test:ui"]
alias = ["ds:test:ui"]
dir = "packages/design-system"
env = { PLAYWRIGHT_BASE_URL = "http://127.0.0.1:3002" }
run = "bunx playwright test"

[tasks."design-system:test:ui:headed"]
dir = "packages/design-system"
env = { PLAYWRIGHT_BASE_URL = "http://127.0.0.1:3002" }
run = "bunx playwright test --headed"

[tasks."design-system:test:ui:managed"]
dir = "packages/design-system"
run = "bunx playwright test"

[tasks."design-system:validate"]
alias = ["ds:validate"]
dir = "packages/design-system"
run = "bun run validate"

[tasks."tilt:up"]
run = "tilt up"

[tasks."tilt:down"]
run = "tilt down"

[tasks."db:push:prod"]
env = { _.file = ".env", DATABASE_URL = "./sqlite/prod.db" }
run = "bunx drizzle-kit push"

[tasks."ts:check:all"]
alias = ["typecheck"]
run = [
  "mise run '//packages/...:ts:check'",
  "mise run '//apps/...:ts:check'",
]

[tasks."lint:all"]
run = ["mise run '//packages/...:lint'", "mise run '//apps/...:lint'"]

[tasks."lint:fix:all"]
run = ["mise run '//packages/...:lint:fix'", "mise run '//apps/...:lint:fix'"]

[tasks."format:check"]
run = "bun run format:check"

[tasks."format:fix"]
run = "bun run format:fix"

[tasks."fix:all"]
run = ["mise run format:fix", "mise run lint:fix:all"]

[tasks."test:all"]
run = ["mise run '//packages/...:test'", "mise run '//apps/...:test'"]

[tasks."build:all"]
run = [
  "mise run //apps/app:build",
  "mise run //apps/docs-site:build",
  "mise run //apps/server:build",
  "mise run //apps/splat-desktop:build",
  "mise run //apps/splat-web:build",
  "mise run //packages/core:build",
  "mise run //packages/design-system:build",
  "mise run //packages/geometry:build",
  "mise run //packages/renderer-canvas:build",
  "mise run //packages/renderer-raster:build",
  "mise run //packages/testing:build",
]

[tasks."test:ui:all"]
run = "mise run //packages/design-system:test:ui:managed"

[tasks."validate:all"]
run = [
  "mise run format:check",
  "mise run lint:all",
  "mise run ts:check:all",
  "mise run test:all",
  "mise run build:all",
  "mise run test:ui:all",
]

[tasks."docs:typedoc"]
run = """
bun x typedoc \
  --tsconfig packages/core/tsconfig.typedoc.json \
  --entryPoints packages/core/src/index.ts \
  --out docs/.vuepress/public/api
"""

[tasks."docs:dev"]
dir = "apps/docs-site"
run = "bun run dev"

[tasks."docs:build"]
depends = ["docs:typedoc"]
dir = "apps/docs-site"
run = "bun run build"

[tasks."splat:web:build"]
run = "mise run //apps/splat-web:build"

[tasks."splat:web:deploy"]
run = "mise run //apps/splat-web:deploy"

[tasks."splat:desktop:dev"]
dir = "apps/splat-desktop"
run = "bun run dev"

[tasks."splat:desktop:build"]
run = "mise run //apps/splat-desktop:build"

[tasks."splat:desktop:package"]
run = "mise run //apps/splat-desktop:package"

[tasks."server:secrets"]
env = { _.file = ".env.prod" }
run = """
fly secrets set \
  OPAQUE_SERVER_SETUP="$OPAQUE_SERVER_SETUP" \
  R2_ACCOUNT_ID="$R2_ACCOUNT_ID" \
  R2_BUCKET="$R2_BUCKET" \
  R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
  R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
  R2_PUBLIC_BASE_URL="$R2_PUBLIC_BASE_URL" \
  -a splatterboard
"""

[tasks."server:deploy"]
run = "fly deploy -c apps/server/fly.toml"

[tasks.deploy]
run = ["mise run prod:build", "mise run server:deploy"]
