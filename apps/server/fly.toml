# fly.toml app configuration file for splatterboard-server
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'splatterboard-server'
primary_region = 'ams'
swap_size_mb = 2048

[build]

[env]
PORT = '3000'
NODE_ENV = 'production'
DATABASE_URL = '/data/app.db'
AUTOMERGE_DB_PATH = '/data/automerge.db'

[mounts]
source = 'data'
destination = '/data'

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
size = 'shared-cpu-1x'
