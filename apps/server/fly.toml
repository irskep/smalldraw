# fly.toml app configuration file for splatterboard-server
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'splatterboard-server'
primary_region = 'ams'
swap_size_mb = 2048

[build]

[deploy]
release_command = 'bunx drizzle-kit push'

[env]
PORT = '3000'

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
size = 'shared-cpu-1x'
