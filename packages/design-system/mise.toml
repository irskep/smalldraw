[tasks.dev]
run = "bun run dev"

[tasks.build]
run = "bun run build"

[tasks."ts:check"]
run = "bun run ts:check"

[tasks.lint]
run = "bun run lint"

[tasks."lint:fix"]
run = "bun run lint:fix"

[tasks.test]
run = "bun run test"

[tasks."test:ui"]
run = "bun run test:ui:managed"

[tasks."test:ui:managed"]
run = "bunx playwright test"

[tasks."localci:typecheck"]
run = "bun run ts:check"

[tasks."localci:lint"]
run = "bun run lint"

[tasks."localci:test"]
run = "bun run test"

[tasks."localci:build"]
run = "bun run build"

[tasks."localci:test:ui"]
run = "bunx playwright test"
